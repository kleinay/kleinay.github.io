<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כתבים בהגות ורוח — איל קליין</title>
  <meta name="description" content="אוסף מאמרים אישיים בהגות יהודית ורוחנית מאת איל קליין" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Frank+Ruhl+Libre:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #2c1f18;
      --ink-mid:    #4a352a;
      --accent:     #a8532b;
      --accent-light:#c96e3f;
      --gold:       #9c7a2e;
      --bg:         #faf6f0;
      --white:      #ffffff;
      --text:       #2c1f18;
      --muted:      #6b594d;
      --border:     #e7dccd;
      --radius:     10px;
      --shadow:     0 4px 24px rgba(44,31,24,.09);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 1rem;
    }

    header.top {
      background: var(--ink);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    .top-logo {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
    }
    .top-back {
      color: #d9c6b3;
      text-decoration: none;
      font-size: .85rem;
      font-weight: 500;
    }
    .top-back:hover { color: #fff; }

    .hero {
      background: linear-gradient(135deg, var(--ink) 0%, #3d2b21 60%, var(--accent) 130%);
      padding: 3.5rem 2rem 3rem;
      text-align: center;
    }
    .hero h1 {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: .7rem;
    }
    .hero p {
      max-width: 640px;
      margin: 0 auto;
      color: #e7d5c4;
      font-size: 1rem;
      line-height: 1.8;
    }

    section { padding: 3rem 2rem 4.5rem; }
    .container { max-width: 900px; margin: 0 auto; }

    .list-toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1rem;
    }
    .toggle-all-btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--ink-mid);
      font-family: inherit;
      font-size: .85rem;
      font-weight: 600;
      padding: .5rem 1rem;
      border-radius: 7px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .toggle-all-btn:hover { border-color: var(--accent-light); color: var(--accent); }
    .toggle-all-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform .2s; }
    .toggle-all-btn.all-open svg { transform: rotate(180deg); }

    .writings-list {
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }
    .writing-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: box-shadow .15s, border-color .15s;
    }
    .writing-card:hover {
      box-shadow: var(--shadow);
      border-color: var(--accent-light);
    }
    .writing-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.3rem;
    }
    .writing-icon {
      flex-shrink: 0;
      width: 38px; height: 38px;
      border-radius: 8px;
      background: #f3e6d8;
      display: flex; align-items: center; justify-content: center;
    }
    .writing-icon svg { width: 19px; height: 19px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .writing-title {
      font-size: 1.02rem;
      font-weight: 600;
      color: var(--ink);
      flex: 1;
      text-decoration: none;
    }
    .writing-title:hover { color: var(--accent); }
    .writing-meta {
      flex-shrink: 0;
      font-size: .76rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .writing-arrow {
      color: var(--muted);
      font-size: 1.1rem;
      flex-shrink: 0;
      text-decoration: none;
    }
    .summary-toggle {
      flex-shrink: 0;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      color: var(--muted);
      transition: background .15s, color .15s, border-color .15s;
    }
    .summary-toggle:hover { background: #f3e6d8; color: var(--accent); border-color: var(--accent-light); }
    .summary-toggle svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; transition: transform .2s; }
    .writing-card.open .summary-toggle svg { transform: rotate(180deg); }

    .writing-summary {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows .25s ease;
    }
    .writing-card.open .writing-summary { grid-template-rows: 1fr; }
    .writing-summary-inner { overflow: hidden; }
    .writing-summary-content {
      padding: 0 1.3rem 1.3rem 1.3rem;
      border-top: 1px solid var(--border);
      margin: 0 1.3rem;
      padding-right: 0;
      padding-left: 0;
    }
    .writing-subtitle {
      font-weight: 600;
      color: var(--accent);
      font-size: .92rem;
      margin: 1rem 0 .5rem;
    }
    .writing-summary-content p.body {
      color: var(--muted);
      font-size: .93rem;
      line-height: 1.85;
      margin-bottom: 0;
    }
    .writing-summary-content p.body:first-child { margin-top: 1rem; }

    footer {
      background: var(--ink);
      color: #a68d78;
      text-align: center;
      padding: 1.4rem 2rem;
      font-size: .82rem;
    }
    footer a { color: #d9c6b3; text-decoration: none; }
    footer a:hover { color: #fff; }

    @media (max-width: 600px) {
      section { padding: 2rem 1.2rem 3rem; }
      header.top { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<header class="top">
  <a href="index.html" class="top-logo">איל קליין</a>
  <a href="index.html" class="top-back">← חזרה לדף הבית</a>
</header>

<div class="hero">
  <h1>כתבים בהגות ורוח</h1>
  <p>אוסף מאמרים אישיים שכתבתי לאורך השנים בהקשרים רוחניים-דתיים. לכל מאמר ניתן לצפות ישירות בדפדפן, וגם להוריד כקובץ PDF.</p>
</div>

<section>
  <div class="container">
    <div class="list-toolbar">
      <button class="toggle-all-btn" id="toggle-all">
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        <span id="toggle-all-label">הצג תקצירים</span>
      </button>
    </div>
    <div class="writings-list" id="writings-list"></div>
  </div>
</section>

<footer>
  <p>המקור המלא זמין ב־<a href="https://github.com/kleinay/Religious-Philosophical-Writings" target="_blank" rel="noopener">מאגר ה-GitHub</a></p>
</footer>

<script src="writings-data.js"></script>
<script>
  const files = WRITINGS;

  const list = document.getElementById("writings-list");

  files.forEach(({ file, title: titleOverride, subtitle, summary, pages, words }) => {
    const title = titleOverride || file.replace(/\.pdf$/i, "");
    const hasSummary = Boolean(summary && summary.trim());

    const card = document.createElement("div");
    card.className = "writing-card";

    const row = document.createElement("div");
    row.className = "writing-row";
    row.innerHTML = `
      <span class="writing-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </span>
    `;

    const titleLink = document.createElement("a");
    titleLink.className = "writing-title";
    titleLink.href = "writings-view.html?f=" + encodeURIComponent(file);
    titleLink.textContent = title;
    row.appendChild(titleLink);

    if (pages && words) {
      const WPM = 170;
      const minutes = Math.max(1, Math.round(words / WPM));
      const meta = document.createElement("span");
      meta.className = "writing-meta";
      meta.textContent = `${pages} עמ׳ · כ-${minutes} דק׳ קריאה`;
      row.appendChild(meta);
    }

    if (hasSummary) {
      const toggleBtn = document.createElement("button");
      toggleBtn.className = "summary-toggle";
      toggleBtn.setAttribute("aria-expanded", "false");
      toggleBtn.setAttribute("aria-label", "הצג/הסתר תקציר");
      toggleBtn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;
      toggleBtn.addEventListener("click", () => {
        const isOpen = card.classList.toggle("open");
        toggleBtn.setAttribute("aria-expanded", String(isOpen));
      });
      row.appendChild(toggleBtn);
    } else {
      const arrow = document.createElement("a");
      arrow.className = "writing-arrow";
      arrow.href = titleLink.href;
      arrow.textContent = "←";
      row.appendChild(arrow);
    }

    card.appendChild(row);

    if (hasSummary) {
      const summaryWrap = document.createElement("div");
      summaryWrap.className = "writing-summary";
      const inner = document.createElement("div");
      inner.className = "writing-summary-inner";
      const content = document.createElement("div");
      content.className = "writing-summary-content";

      if (subtitle && subtitle.trim()) {
        const subtitleEl = document.createElement("p");
        subtitleEl.className = "writing-subtitle";
        subtitleEl.textContent = subtitle;
        content.appendChild(subtitleEl);
      }

      const bodyEl = document.createElement("p");
      bodyEl.className = "body";
      bodyEl.textContent = summary;
      content.appendChild(bodyEl);

      inner.appendChild(content);
      summaryWrap.appendChild(inner);
      card.appendChild(summaryWrap);
    }

    list.appendChild(card);
  });

  // Master "show/hide all summaries" toggle.
  const toggleAllBtn = document.getElementById("toggle-all");
  const toggleAllLabel = document.getElementById("toggle-all-label");
  let allOpen = false;

  toggleAllBtn.addEventListener("click", () => {
    allOpen = !allOpen;
    document.querySelectorAll(".writing-card").forEach(card => {
      const btn = card.querySelector(".summary-toggle");
      if (!btn) return;
      card.classList.toggle("open", allOpen);
      btn.setAttribute("aria-expanded", String(allOpen));
    });
    toggleAllBtn.classList.toggle("all-open", allOpen);
    toggleAllLabel.textContent = allOpen ? "הסתר תקצירים" : "הצג תקצירים";
  });
</script>

</body>
</html>
