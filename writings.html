<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כתבים בהגות ורוח — איל קליין</title>
  <meta name="description" content="אוסף מאמרים אישיים בהגות יהודית ורוחנית מאת איל קליין" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Frank+Ruhl+Libre:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #2c1f18;
      --ink-mid:    #4a352a;
      --accent:     #a8532b;
      --accent-light:#c96e3f;
      --gold:       #9c7a2e;
      --bg:         #faf6f0;
      --white:      #ffffff;
      --text:       #2c1f18;
      --muted:      #6b594d;
      --border:     #e7dccd;
      --radius:     10px;
      --shadow:     0 4px 24px rgba(44,31,24,.09);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 1rem;
    }

    header.top {
      background: var(--ink);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    .top-logo {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
    }
    .top-back {
      color: #d9c6b3;
      text-decoration: none;
      font-size: .85rem;
      font-weight: 500;
    }
    .top-back:hover { color: #fff; }

    .hero {
      background: linear-gradient(135deg, var(--ink) 0%, #3d2b21 60%, var(--accent) 130%);
      padding: 3.5rem 2rem 3rem;
      text-align: center;
    }
    .hero h1 {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: .7rem;
    }
    .hero p {
      max-width: 640px;
      margin: 0 auto;
      color: #e7d5c4;
      font-size: 1rem;
      line-height: 1.8;
    }

    section { padding: 3rem 2rem 4.5rem; }
    .container { max-width: 900px; margin: 0 auto; }

    .writings-list {
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }
    .writing-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.3rem;
      text-decoration: none;
      color: var(--text);
      transition: transform .15s, box-shadow .15s, border-color .15s;
    }
    .writing-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
      border-color: var(--accent-light);
    }
    .writing-icon {
      flex-shrink: 0;
      width: 38px; height: 38px;
      border-radius: 8px;
      background: #f3e6d8;
      display: flex; align-items: center; justify-content: center;
    }
    .writing-icon svg { width: 19px; height: 19px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .writing-title {
      font-size: 1.02rem;
      font-weight: 600;
      color: var(--ink);
      flex: 1;
    }
    .writing-arrow {
      color: var(--muted);
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    footer {
      background: var(--ink);
      color: #a68d78;
      text-align: center;
      padding: 1.4rem 2rem;
      font-size: .82rem;
    }
    footer a { color: #d9c6b3; text-decoration: none; }
    footer a:hover { color: #fff; }

    @media (max-width: 600px) {
      section { padding: 2rem 1.2rem 3rem; }
      header.top { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<header class="top">
  <a href="index.html" class="top-logo">איל קליין</a>
  <a href="index.html" class="top-back">← חזרה לדף הבית</a>
</header>

<div class="hero">
  <h1>כתבים בהגות ורוח</h1>
  <p>אוסף מאמרים אישיים שכתבתי לאורך השנים בהקשרים רוחניים-דתיים, נפרד מעיסוקי האקדמי. לכל מאמר ניתן לצפות ישירות בדפדפן, וגם להוריד כקובץ PDF.</p>
</div>

<section>
  <div class="container">
    <div class="writings-list" id="writings-list"></div>
  </div>
</section>

<footer>
  <p>המקור המלא זמין ב־<a href="https://github.com/kleinay/Religious-Philosophical-Writings" target="_blank" rel="noopener">מאגר ה-GitHub</a></p>
</footer>

<script>
  // Filenames as they exist in the kleinay/Religious-Philosophical-Writings repo (branch: main)
  const files = [
    "אל האני ומעבר לו.pdf",
    "אמנות הדיאלוג בעידן של תקשורת.pdf",
    "ההזדמנות שבחוסר ההתחברות.pdf",
    "החכמה בקהלת.pdf",
    "הטוב והקודש.pdf",
    "זמנים מתים וחשיבה חופשית.pdf",
    "טוב להודות.pdf",
    "לאהבה.pdf",
    "למען שמו באהבה.pdf",
    "מי אני ומה שמי.pdf",
    "מעין עולם הבא.pdf",
    "סוכות כבית עם הקב''ה.pdf",
    "סוכות כמפגש צירים וכחתונה.pdf",
    "על אידיאלים וערכים.pdf",
    "על הורים וילדים ועל פנים בפנים.pdf",
    "על הצניעות - לחברת הנוער המעורבת.pdf",
    "על הצניעות - לחברת מבוגרים.pdf",
    "על חטא שחטאנו בוידוי פה.pdf",
    "על יראת המוות.pdf",
    "על קולנוע.pdf",
    "ענווה.pdf",
    "צלם א-להים שבזולת.pdf",
    "קול ה' בכח.pdf",
    "שומר תבונה למצוא טוב.pdf"
  ];

  const list = document.getElementById("writings-list");
  files.forEach(filename => {
    const title = filename.replace(/\.pdf$/i, "");
    const a = document.createElement("a");
    a.className = "writing-card";
    a.href = "writings-view.html?f=" + encodeURIComponent(filename);
    a.innerHTML = `
      <span class="writing-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </span>
      <span class="writing-title"></span>
      <span class="writing-arrow">←</span>
    `;
    a.querySelector(".writing-title").textContent = title;
    list.appendChild(a);
  });
</script>

</body>
</html>
