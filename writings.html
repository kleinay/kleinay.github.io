<html lang="he" dir="rtl">
<head>

  <title>כתבים בהגות ורוח — איל קליין</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #2c1f18;
      --ink-mid:    #4a352a;
      --accent:     #a8532b;
      --accent-light:#c96e3f;
      --gold:       #9c7a2e;
      --bg:         #faf6f0;
      --white:      #ffffff;
      --text:       #2c1f18;
      --muted:      #6b594d;
      --border:     #e7dccd;
      --radius:     10px;
      --shadow:     0 4px 24px rgba(44,31,24,.09);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 1rem;
    }

    header.top {
      background: var(--ink);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    .top-logo {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
    }
    .top-back {
      color: #d9c6b3;
      text-decoration: none;
      font-size: .85rem;
      font-weight: 500;
    }
    .top-back:hover { color: #fff; }

    .hero {
      background: linear-gradient(135deg, var(--ink) 0%, #3d2b21 60%, var(--accent) 130%);
      padding: 3.5rem 2rem 3rem;
      text-align: center;
    }
    .hero h1 {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: .7rem;
    }
    .hero p {
      max-width: 640px;
      margin: 0 auto;
      color: #e7d5c4;
      font-size: 1rem;
      line-height: 1.8;
    }

    section { padding: 3rem 2rem 4.5rem; }
    .container { max-width: 900px; margin: 0 auto; }

    .list-toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1rem;
    }
    .toggle-all-btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      background: var(--white);
      border: 1px solid var(--border);
      color: var(--ink-mid);
      font-family: inherit;
      font-size: .85rem;
      font-weight: 600;
      padding: .5rem 1rem;
      border-radius: 7px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .toggle-all-btn:hover { border-color: var(--accent-light); color: var(--accent); }
    .toggle-all-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: transform .2s; }
    .toggle-all-btn.all-open svg { transform: rotate(180deg); }

    .writings-list {
      display: flex;
      flex-direction: column;
      gap: .9rem;
    }
    .writing-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: box-shadow .15s, border-color .15s;
    }
    .writing-card:hover {
      box-shadow: var(--shadow);
      border-color: var(--accent-light);
    }
    .writing-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.3rem;
    }
    .writing-icon {
      flex-shrink: 0;
      width: 38px; height: 38px;
      border-radius: 8px;
      background: #f3e6d8;
      display: flex; align-items: center; justify-content: center;
    }
    .writing-icon svg { width: 19px; height: 19px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .writing-title {
      font-size: 1.02rem;
      font-weight: 600;
      color: var(--ink);
      flex: 1;
      text-decoration: none;
    }
    .writing-title:hover { color: var(--accent); }
    .writing-arrow {
      color: var(--muted);
      font-size: 1.1rem;
      flex-shrink: 0;
      text-decoration: none;
    }
    .summary-toggle {
      flex-shrink: 0;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      color: var(--muted);
      transition: background .15s, color .15s, border-color .15s;
    }
    .summary-toggle:hover { background: #f3e6d8; color: var(--accent); border-color: var(--accent-light); }
    .summary-toggle svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; transition: transform .2s; }
    .writing-card.open .summary-toggle svg { transform: rotate(180deg); }

    .writing-summary {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows .25s ease;
    }
    .writing-card.open .writing-summary { grid-template-rows: 1fr; }
    .writing-summary-inner { overflow: hidden; }
    .writing-summary-content {
      padding: 0 1.3rem 1.3rem 1.3rem;
      border-top: 1px solid var(--border);
      margin: 0 1.3rem;
      padding-right: 0;
      padding-left: 0;
    }
    .writing-subtitle {
      font-weight: 600;
      color: var(--accent);
      font-size: .92rem;
      margin: 1rem 0 .5rem;
    }
    .writing-summary-content p.body {
      color: var(--muted);
      font-size: .93rem;
      line-height: 1.85;
      margin-bottom: 0;
    }
    .writing-summary-content p.body:first-child { margin-top: 1rem; }

    footer {
      background: var(--ink);
      color: #a68d78;
      text-align: center;
      padding: 1.4rem 2rem;
      font-size: .82rem;
    }
    footer a { color: #d9c6b3; text-decoration: none; }
    footer a:hover { color: #fff; }

    @media (max-width: 600px) {
      section { padding: 2rem 1.2rem 3rem; }
      header.top { padding: 0 1rem; }
    }
  </style>
</head>

    { file: "על הצניעות - לחברת מבוגרים.pdf",
      subtitle: "",
      summary: "" },

    { file: "על חטא שחטאנו בוידוי פה.pdf",
      subtitle: "",
      summary: "" },

    { file: "על יראת המוות.pdf",
      subtitle: "",
      summary: "מתוך חוויה אישית של חרדת מוות ישירה וממשית, במאמר אני מנסה להבין את מהות יראת המוות ומקורותיה: האם היא פחד קמאי מפני הבלתי-נודע, או ביטוי - אולי הבסיסי ביותר - של אהבת החיים? אני טוען כי יראת המוות משקפת בעומקה את אהבתנו לחיים, ומתוך כך דן ביחס בין החיים כאן לעולם הבא, ובשאלה כיצד אמונה דתית יכולה - במקום לשתק אותנו בפחד - לחזק דווקא את המשמעות והאהבה שאנו נותנים לחיים המוגבלים שניתנו לנו." },

    { file: "על קולנוע.pdf",
      subtitle: "אל תחיו בסרט — על השפעות צריכת הקולנוע",
      summary: "מה עושה לנו צריכת הקולנוע האינטנסיבית של ימינו? במאמר אני בוחן את ההשפעה הפסיכולוגית של הקולנוע על תודעתנו, מעבר לתוכן הספציפי של הסרטים. אני עומד על עוצמת הייצוג הקולנועי - שילוב חזותי, קולי ונרטיבי בו-זמנית - ועל האופן שבו הקולנוע \"מכווץ\" תהליכים רגשיים ממושכים (התאהבות, אבל, משבר מוסרי) לכדי דקות ספורות על המסך. אני טוען שהחשיפה המתמדת לדחיסה הזו מעצבת אצלנו ציפיות סמויות לגבי קצב רגשותינו-אנו, ומחלישה את יכולתנו לחוות באמת את הזמן הלא-דרמטי שמהווה את עיקר החיים." },

    { file: "ענווה.pdf",
      subtitle: "ותחסרהו מעט — דיון במידת הענווה",
      summary: "למידת הענווה נודעת חשיבות רבת-משקל בעיצוב המוסרי-מידותי של האדם. שאלת ההתיחסות העצמית נידונה במאמר זה משני כיוונים: הן מצד החברה, דהיינו לאיזה מידה של כבוד ושל ערך מצפה האדם מהתיחסות הזולת כלפיו, והן מצד עצמו, דהיינו איך הוא בוחר להסתכל על עצמו ולמדוד את ערכו בעיניו. המאמר מנסה לפלס ולהאיר דרכים חדשות בתפיסת הענווה." },

    { file: "צלם א-להים שבזולת.pdf",
      subtitle: "",
      summary: "" },

    { file: "קול ה' בכח.pdf",
      subtitle: "על \"הקווים האדומים\" שלנו בשמיעה לדבר ה'",
      summary: "האם ניתן לדבר על מקומות בהם אנו לא מסוגלים לשמוע לדבר ה'? ואם כן, מה המשמעות הרוחנית של עובדה פסיכולוגית מעין זו, אם ישנה? מאמר זה עוסק בשאלת היחס בין דבר ה' המוחלט לבין המדיום האנושי המשיג אותו, וצועד בעיקר בעקבות דימוי האור והכלי הלקוחה מהספרות הקבלית. לאחר דיון במשמעותו של דימוי זה בהקשר של התגלות הא-להים בסיני ויחסי תורה שבכתב - תורה שבעל פה, נדון בדתיות מפרספקטיבה פסיכולוגית, ונטען כי דתיות הינה הרצון והצורך לרומם את החיים ע\"י קשירתם אל ה\"אחר\" והנשגב. נטען כי יתכנו צווים א-להיים אשר מאיימים על התודעה האנושית-דתית, עד כדי כך שלא נותר לה אלא להותיר צווים אלו מחוצה לה, כבמנגנונים פסיכולוגיים של הכחשה, על מנת לשמור על שלמותה. נדגים בהקשר קולקטיבי ואישי, ונדון בבעיית הלגיטימציה ובהשלכות של התמונה המוצעת." },

    { file: "שומר תבונה למצוא טוב.pdf",
      subtitle: "על השיקול המוסרי-קיומי בהכרעות קוגניטיביות",
      summary: "הספק מלווה את חיינו התודעתיים כמעט בכל הקשר. בנסיבות רבות אין לנו דרך קוגניטיבית תקפה להכריע לגבי טיבה של המציאות שבפנינו, ואנו נאלצים לבחור ב\"אמונה\" מסוימת על פני חלופותיה. במאמר זה אטען כי נכון לבחור באמונה אחת על פני אחרת על סמך שיקולים מוסריים וקיומיים, דהיינו, על סמך השאלה הפרגמטית איזו הכרעה קוגניטיבית תעשה את חיינו לטובים ונכונים יותר. נמחיש את טענתנו בהקשרים של שיפוט הזולת, מידת הביטחון, אופטימיות ושאלת הספקנות הכרונית, ונסיק כי המחויבות לחיפוש האמת היא חובה מוסרית העומדת בשורה אחת עם שיקולים מוסריים אחרים." }
  ];

  const list = document.getElementById("writings-list");

  files.forEach(({ file, subtitle, summary }) => {
    const title = file.replace(/\.pdf$/i, "");
    const hasSummary = Boolean(summary && summary.trim());

    const card = document.createElement("div");
    card.className = "writing-card";

    const row = document.createElement("div");
    row.className = "writing-row";
    row.innerHTML = `
      <span class="writing-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </span>
    `;

    const titleLink = document.createElement("a");
    titleLink.className = "writing-title";
    titleLink.href = "writings-view.html?f=" + encodeURIComponent(file);
    titleLink.textContent = title;
    row.appendChild(titleLink);

    if (hasSummary) {
      const toggleBtn = document.createElement("button");
      toggleBtn.className = "summary-toggle";
      toggleBtn.setAttribute("aria-expanded", "false");
      toggleBtn.setAttribute("aria-label", "הצג/הסתר תקציר");
      toggleBtn.innerHTML = `<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`;
      toggleBtn.addEventListener("click", () => {
        const isOpen = card.classList.toggle("open");
        toggleBtn.setAttribute("aria-expanded", String(isOpen));
      });
      row.appendChild(toggleBtn);
    } else {
      const arrow = document.createElement("a");
      arrow.className = "writing-arrow";
      arrow.href = titleLink.href;
      arrow.textContent = "←";
      row.appendChild(arrow);
    }

    card.appendChild(row);

    if (hasSummary) {
      const summaryWrap = document.createElement("div");
      summaryWrap.className = "writing-summary";
      const inner = document.createElement("div");
      inner.className = "writing-summary-inner";
      const content = document.createElement("div");
      content.className = "writing-summary-content";

      if (subtitle && subtitle.trim()) {
        const subtitleEl = document.createElement("p");
        subtitleEl.className = "writing-subtitle";
        subtitleEl.textContent = subtitle;
        content.appendChild(subtitleEl);
      }

      const bodyEl = document.createElement("p");
      bodyEl.className = "body";
      bodyEl.textContent = summary;
      content.appendChild(bodyEl);

      inner.appendChild(content);
      summaryWrap.appendChild(inner);
      card.appendChild(summaryWrap);
    }

    list.appendChild(card);
  });

  // Master "show/hide all summaries" toggle.
  const toggleAllBtn = document.getElementById("toggle-all");
  const toggleAllLabel = document.getElementById("toggle-all-label");
  let allOpen = false;

  toggleAllBtn.addEventListener("click", () => {
    allOpen = !allOpen;
    document.querySelectorAll(".writing-card").forEach(card => {
      const btn = card.querySelector(".summary-toggle");
      if (!btn) return;
      card.classList.toggle("open", allOpen);
      btn.setAttribute("aria-expanded", String(allOpen));
    });
    toggleAllBtn.classList.toggle("all-open", allOpen);
    toggleAllLabel.textContent = allOpen ? "הסתר תקצירים" : "הצג תקצירים";
  });
</script>
