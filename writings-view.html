<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>כתבים בהגות ורוח — איל קליין</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Frank+Ruhl+Libre:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #2c1f18;
      --accent:     #a8532b;
      --accent-light:#c96e3f;
      --bg:         #d8cdbe;
      --white:      #ffffff;
      --text:       #2c1f18;
      --muted:      #6b594d;
      --border:     #e7dccd;
      --radius:     10px;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
    }

    header.top {
      background: var(--ink);
      padding: 0 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      height: 58px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    .top-back {
      color: #d9c6b3;
      text-decoration: none;
      font-size: .85rem;
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .top-back:hover { color: #fff; }
    .top-title {
      font-family: 'Frank Ruhl Libre', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      text-align: center;
    }
    .top-download {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: var(--accent);
      color: #fff;
      padding: .45rem 1rem;
      border-radius: 7px;
      font-size: .85rem;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background .2s;
    }
    .top-download:hover { background: var(--accent-light); }
    .top-download svg { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .pages {
      max-width: 900px;
      margin: 1.5rem auto;
      padding: 0 1rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .page-img {
      display: block;
      width: 100%;
      max-width: 100%;
      height: auto;
      background: var(--white);
      box-shadow: 0 2px 14px rgba(44,31,24,.18);
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      color: var(--muted);
      font-size: .95rem;
      padding: 3rem 1rem;
      text-align: center;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid #c9b8a3;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .fallback {
      max-width: 640px;
      margin: 2.5rem auto;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.6rem 1.8rem;
      text-align: center;
      display: none;
    }
    .fallback p { color: var(--muted); margin-bottom: 1rem; line-height: 1.7; }
    .fallback a { color: var(--accent); font-weight: 600; text-decoration: none; }
    .fallback a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header class="top">
  <a href="writings.html" class="top-back">← רשימת הכתבים</a>
  <span class="top-title" id="doc-title"></span>
  <a class="top-download" id="download-link" download>
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    הורדה
  </a>
</header>

<div class="status" id="status"><span class="spinner"></span> טוען מסמך…</div>
<div class="pages" id="pages"></div>

<div class="fallback" id="fallback">
  <p>לא ניתן להציג את המסמך ישירות בדפדפן זה.</p>
  <a id="fallback-link" target="_blank" rel="noopener">פתיחת הקובץ בטאב חדש ←</a>
</div>

<script src="writings-data.js"></script>
<script>
  const REPO_BASE = "https://raw.githubusercontent.com/kleinay/Religious-Philosophical-Writings/main/";

  const params = new URLSearchParams(window.location.search);
  const filename = params.get("f");
  const entry = filename ? WRITINGS.find(w => w.file === filename) : null;

  if (!filename || !entry) {
    window.location.href = "writings.html";
  } else {
    const title = entry.title || filename.replace(/\.pdf$/i, "");
    const fileUrl = REPO_BASE + encodeURIComponent(filename);

    document.title = title + " — כתבים בהגות ורוח";
    document.getElementById("doc-title").textContent = title;

    const downloadLink = document.getElementById("download-link");
    downloadLink.href = fileUrl;
    downloadLink.setAttribute("download", filename);
    document.getElementById("fallback-link").href = fileUrl;

    const statusEl = document.getElementById("status");
    const pagesEl = document.getElementById("pages");

    function showFallback() {
      statusEl.style.display = "none";
      pagesEl.innerHTML = "";
      document.getElementById("fallback").style.display = "block";
    }

    // Pages are pre-rendered to images (see writings-pages/), rather than
    // relying on a browser's native PDF viewer or a client-side PDF engine:
    // both render Hebrew text inconsistently (or not at all) across mobile
    // browsers and in-app browsers, while a plain <img> works everywhere.
    if (!entry.slug || !entry.pages) {
      showFallback();
    } else {
      let loaded = 0;
      let failed = false;

      for (let i = 1; i <= entry.pages; i++) {
        const img = document.createElement("img");
        img.className = "page-img";
        img.src = `writings-pages/${entry.slug}/${i}.jpg`;
        img.alt = `${title} — עמוד ${i}`;
        img.loading = i <= 2 ? "eager" : "lazy";
        img.decoding = "async";
        img.addEventListener("load", () => {
          loaded++;
          if (statusEl.style.display !== "none") statusEl.style.display = "none";
        });
        img.addEventListener("error", () => {
          if (!failed && loaded === 0) {
            failed = true;
            showFallback();
          }
        });
        pagesEl.appendChild(img);
      }
    }
  }
</script>

</body>
</html>
